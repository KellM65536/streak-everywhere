<!--DOCTYPE HTML-->

<html lang="eng">
<head>
    <title>Debug Screen</title>
</head>
<body>
    <div id="delete-confirmation-lightbox">
        <div class="inner-confirmation-box">
        <p>Are you sure you want to clear all history?</p>
        <div class="button-box" style="justify-content: center;">
            <button id="close-delete-confirmation-button">No</button>
            <button id="confirm-deletion-button">Yes</button>
        </div>
        </div>
    </div>

    <div class="main-content">
        <h1>Streak Everywhere</h1>
        <img src="/images/man_running_pictogram.png" class="main-icon">
        <p class="caption-note">Version 0.0.0</p>

        <input type="text" id="url-search" placeholder="Type url">
        <table>
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Streak</th>
                </tr>
            </thead>
            <tbody id="streak-table">
                <!--This is filled with information for streaks-->
            </tbody>
        </table>

        <div class="button-box">
            <button id="show-all-button" class="popup-button">Load All</button>
            <button id="clear-all-button" class="popup-button">Clear All</button>
        </div>
    </div>
</body>

<script src="popup.js"></script>
</html>

<style>
    body {
        padding: 0px;
        margin: 0px;
    }

    /* .main-content {
        padding: initial;
    } */

    .main-icon {
        width: 10rem;
    }

    .caption-note {
        size: 80%;
        color: gray;
    }

    .button-box {
        display: flex;
    }

    .popup-button {
        color:white;
        border-radius: 5rem;
        border-width: 0px;
        padding: 0.4rem;
        margin: 0.4rem;
        width: 100%;
    }

    #show-all-button {
        background-color: #00ff00;
        flex-shrink: 0.75;
    }

    #clear-all-button {
        background-color:red;
    }

    #show-all-button:hover {
        background-color: #006500;
    }

    #show-all-button:active {
        background-color: #002a00;
    }

    #clear-all-button:hover {
        background-color:#620000;
    }

    #clear-all-button:active {
        background-color:#3e0000;
    }

    #delete-confirmation-lightbox{
        background-color: rgba(0, 0, 0, 0.5);
        width: 100%;
        height: 100%;
        margin: 0px;
        position: fixed;
        display: none;
        flex-direction: column;
        justify-content: center
    }

    .inner-confirmation-box {
        background-color: rgb(214, 214, 214);
        border-radius: 0.5rem;
        padding: 0.5rem;
        margin: 0.5rem;
    }
</style>
