<!--DOCTYPE HTML-->

<html lang="eng">
<head>
    <title>Debug Screen</title>
</head>
<body>
    <h1>Streak Everywhere</h1>
    <img src="/images/man_running_pictogram.png" class="main-icon">
    <p class="caption-note">Version 0.0.0</p>

    <input type="text" id="url-search" placeholder="Type url">
    <table>
        <thead>
            <tr>
                <th>Site</th>
                <th>Streak</th>
            </tr>
        </thead>
        <tbody id="streak-table">
            <!--This is filled with information for streaks-->
        </tbody>
    </table>

    <button id="show-all-button">Load All</button>
</body>

<script src="popup.js"></script>
</html>

<style>
    .main-icon {
        width: 10rem;
    }

    .caption-note {
        size: 80%;
        color: gray;
    }

    #show-all-button {
        color:white;
        background-color: #00ff00;
        border-radius: 5rem;
        border-width: 0px;
        padding: 0.5rem;
        width: 100%;
    }

    #show-all-button:hover {
        background-color: #006500;
    }

    #show-all-button:active {
        background-color: #002a00;
    }
</style>
